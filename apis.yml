apis:
  - aid: screaming-frog:seo-spider
    name: Screaming Frog SEO Spider
    description: >-
      The Screaming Frog SEO Spider is a desktop website crawler for Windows,
      macOS, and Ubuntu that performs comprehensive technical SEO audits. It
      crawls websites to find broken links, analyze page titles and meta data,
      discover duplicate content, generate XML sitemaps, and integrate with
      third-party APIs including Google Analytics, Google Search Console,
      PageSpeed Insights, Ahrefs, Majestic, Moz, and AI services (OpenAI,
      Gemini, Ollama, Anthropic). The Spider acts as an API consumer, pulling
      external metrics and data into crawl reports.
    humanURL: https://www.screamingfrog.co.uk/seo-spider/
    tags:
      - SEO
      - Crawler
      - Technical Audit
      - Analytics Integration
    properties:
