  - aid: screaming-frog:log-file-analyser
    name: Screaming Frog Log File Analyser
    description: >-
      The Screaming Frog Log File Analyser is a free desktop tool that allows
      SEO professionals to upload and analyze server log files to understand
      how search bots are crawling a website. It identifies which pages bots
      visit, how frequently they crawl them, and highlights crawl budget
      inefficiencies. Available for Windows, macOS, and Ubuntu with a paid
      license removing crawl limits.
    humanURL: https://www.screamingfrog.co.uk/log-file-analyser/
    tags:
      - SEO
      - Log Analysis
      - Bot Detection
      - Crawl Analysis
      - Crawl Budget
    properties:
