aid: screaming-frog
name: Screaming Frog
description: >-
  Screaming Frog is a UK-based SEO software company and search marketing agency,
  best known for the SEO Spider website crawler tool used by SEO professionals
  worldwide to perform technical SEO audits, crawl analysis, and integrations
  with third-party APIs. The SEO Spider integrates with Google Analytics (GA4),
  Google Search Console, PageSpeed Insights, Ahrefs, Majestic, Moz, OpenAI,
  Gemini, Ollama, and Anthropic. Screaming Frog also offers a free Log File
  Analyser for analyzing server log files to understand search bot behavior.
type: Index
position: Consumer
access: 3rd-Party
