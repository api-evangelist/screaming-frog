name: Screaming Frog
description: Screaming Frog is a UK-based SEO software company and search marketing agency, best known for the SEO Spider website crawler tool used by SEO professionals worldwide to perform technical audits, analyze on-page data, and integrate with third-party APIs such as Google Analytics, Google Search Console, and PageSpeed Insights.
