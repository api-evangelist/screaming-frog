apis:
- name: Screaming Frog SEO Spider API
  description: The Screaming Frog SEO Spider API provides programmatic access to integrations with Google Analytics, Google Search Console, PageSpeed Insights, Ahrefs, Majestic, Moz, OpenAI, Gemini, Anthropic, and other third-party tools. The Spider itself acts as an API consumer, pulling metrics and data into crawl reports.
